version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: zedtrago-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: zedtrago
      POSTGRES_USER: zedtrago_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zedtrago_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zedtrago_user -d zedtrago"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: zedtrago-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://zedtrago_user:${POSTGRES_PASSWORD:-zedtrago_secret}@postgres:5432/zedtrago
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    ports:
      - "3000:3000"

volumes:
  pgdata:
